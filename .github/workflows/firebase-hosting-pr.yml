name: Firebase Hosting PR Preview

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  preview:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy preview channel
        run: |
          npx -y firebase-tools@latest hosting:channel:deploy pr-${{ github.event.pull_request.number }} \
            --project villa-serenita-san-teodoro \
            --token "$FIREBASE_TOKEN" \
            --expires 7d \
            --json > /tmp/channel-output.json

          echo "=== DEBUG: Checking file ==="
          if [ ! -f /tmp/channel-output.json ]; then
            echo "ERROR: File /tmp/channel-output.json NOT FOUND"
            PREVIEW_URL="File not found"
          else
            echo "File found. Content:"
            cat /tmp/channel-output.json | python3 -m json.tool 2>/dev/null || cat /tmp/channel-output.json
            
            echo ""
            echo "=== DEBUG: Extracting URL ==="
            PREVIEW_URL=$(python3 << 'PYTHON_EOF'
          import json
          import sys

          try:
              with open('/tmp/channel-output.json') as f:
                  d = json.load(f)
              
              print(f"Full structure: {json.dumps(d, indent=2)}", file=sys.stderr)
              
              channels = d.get('result', {}).get('channels', {})
              print(f"Channels found: {list(channels.keys())}", file=sys.stderr)
              
              if channels:
                  first_channel = next(iter(channels.values()))
                  print(f"First channel: {json.dumps(first_channel, indent=2)}", file=sys.stderr)
                  url = first_channel.get('url', '')
                  print(url)
              else:
                  print("No channels found", file=sys.stderr)
                  
          except Exception as e:
              print(f"ERROR: {e}", file=sys.stderr)
          PYTHON_EOF
            )
          fi

          echo "=== RESULT ==="
          echo "PREVIEW_URL: $PREVIEW_URL"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔥 **Firebase Preview Deployed!**\n\n📱 Preview URL: ${url}\n\n_This preview will expire in 7 days._`
            });

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete preview channel
        run: |
          npx -y firebase-tools@latest hosting:channel:delete pr-${{ github.event.pull_request.number }} \
            --project villa-serenita-san-teodoro \
            --token "$FIREBASE_TOKEN" \
            --force || true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
