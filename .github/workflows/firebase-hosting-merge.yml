name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy hosting + Firestore rules and indexes
        run: npx -y firebase-tools@latest deploy --only hosting,firestore:rules,firestore:indexes --project villa-serenita-san-teodoro --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
